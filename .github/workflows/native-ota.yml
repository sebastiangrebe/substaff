name: Native OTA Update

on:
  push:
    branches: [main, master]
    paths:
      - 'native/**'
      - 'packages/app-core/**'
      - 'packages/shared/**'
  workflow_dispatch:
    inputs:
      channel:
        description: 'EAS Update channel'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install monorepo dependencies
        run: cd .. && pnpm install --frozen-lockfile

      - name: Install native dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        run: |
          CHANNEL="${{ github.event.inputs.channel || 'production' }}"
          MESSAGE="$(git log -1 --pretty=format:'%s' HEAD)"
          eas update --channel "$CHANNEL" --message "$MESSAGE" --non-interactive
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ vars.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_SENTRY_ENVIRONMENT: production

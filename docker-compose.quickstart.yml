services:
  substaff:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SUBSTAFF_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      SUBSTAFF_HOME: "/substaff"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - "${SUBSTAFF_DATA_DIR:-./data/docker-substaff}:/substaff"
